<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <h2>Employee Managemant System</h2>
    <input type="text" id="name" placeholder="Employee Name">
    <input type="text" id="id" placeholder="Employee Id">
    <input type="number" id="salary" placeholder="Salary">
    <input type="text" id="dept" placeholder="Department">
    <br><br>

    <button onclick="addEmployee()">Add Employee</button>
    <button onclick="displayEmployee()">Display All</button>
    <button onclick="filterEmployee()">Salary>50000</button>
    <button onclick="totalSalary()">Total Salary</button>
    <button onclick="avgSalary()">Average Salary</button>
    <button onclick="countdept()">Count by Department</button>
    <br><br>

    <div id="output"></div>

<script src="./script.js"></script>  
</body>
</html>
