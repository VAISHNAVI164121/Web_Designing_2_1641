<!DOCTYPE html>
<html>
<head>
<title>Student Result Calculator</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class="bg-dark text-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-lg">
                <div class="card-body p-4">
                    <h2 class="text-center mb-3">Student Result Calculator</h2>
                    <p class="text-center text-muted">Enter number of subjects and calculate your result</p>
                    <div class="mb-3">
                        <label class="form-label">Number of Subjects</label>
                        <input type="number" id="numSubjects" class="form-control" placeholder="Enter number of subjects">
                    </div>
                    <div class="d-grid">
                        <button class="btn btn-primary"onclick="calculateResult()">Calculate Result</button>             
                    </div>
                    <div id="resultbox" class="mt-4 d-none"></div>
                </div>
            </div> 
        </div>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
